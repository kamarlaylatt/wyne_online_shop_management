services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: release
    container_name: wyne-shop-prod
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-shop_db}?schema=public
    depends_on:
      - postgres
    restart: unless-stopped
    profiles:
      - prod

  postgres:
    image: postgres:17-alpine
    container_name: wyne-shop-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-appuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret}
      - POSTGRES_DB=${POSTGRES_DB:-shop_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Development service with hot reload
  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    container_name: wyne-shop-dev
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-shop_db}?schema=public
    volumes:
      - .:/app
    command: ["bun", "run", "dev"]
    depends_on:
      - postgres
    restart: unless-stopped
    profiles:
      - dev

volumes:
  postgres_data:
